name: Build Flutter iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch: # allows manual trigger

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # 3. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Build IPA (no codesign = no Apple Developer account needed)
      - name: Build IPA
        run: |
          flutter build ios --release --no-codesign

      # 5. Create IPA manually
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r PhoneFXPlus.ipa Payload/
          rm -rf Payload/

      # 6. Upload IPA as artifact (downloadable from GitHub)
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PhoneFXPlus-IPA
          path: PhoneFXPlus.ipa
          retention-days: 30